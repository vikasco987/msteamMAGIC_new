version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf .next
        - npm install
        - npx prisma generate
        # Delete redundant prisma engines BEFORE next build to prevent them from being traced
        - find node_modules/.prisma/client -name "libquery_engine-*" ! -name "libquery_engine-rhel-openssl-3.0.x.so.node" -delete
    build:
      commands:
        - npm run build
        - find .next/static -name "*.map" -delete
        - find .next/server -name "*.map" -delete
  artifacts:
    baseDirectory: .next
    files:
      - 'server/**/*'
      - 'static/**/*'
      - '*-manifest.json'
      - 'required-server-files.json'
      - 'BUILD_ID'
  cache:
    paths:
      - node_modules/**/*

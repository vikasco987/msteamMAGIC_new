version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npx prisma generate
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - 'server/**/*'
      - 'static/**/*'
      - 'standalone/**/*'
      - '*-manifest.json'
      - 'required-server-files.json'
      - 'BUILD_ID'
  cache:
    paths:
      - node_modules/**/*

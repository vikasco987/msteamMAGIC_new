version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - npx prisma generate
    build:
      commands:
        # Pre-injecting environment variables for runtime
        - env | grep -E "CLERK_|DATABASE_|NEXT_PUBLIC_|GEMINI_|NEXTAUTH_|CLOUDINARY_|PUSHER_" > .env.production
        - npm run build
        
        # Post-build Cleanup (Only non-essential assets)
        - rm -rf public/videos
        - rm -rf public/avatars
        - rm -rf .next/cache
        - rm -rf node_modules/.cache
        
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

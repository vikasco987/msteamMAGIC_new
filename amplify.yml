version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - npx prisma generate
        - find node_modules/.prisma/client -name "libquery_engine-*" ! -name "libquery_engine-rhel-openssl-3.0.x.so.node" -delete
    build:
      commands:
        - npm run build
        - npm prune --production
        # Micro-pruning node_modules to save final 60MB
        - find node_modules -type f -name "*.map" -delete
        - find node_modules -type f -name "*.d.ts" -delete
        - find node_modules -type f -name "*.md" -delete
        - find node_modules -type d -name "test" -exec rm -rf {} +
        - find node_modules -type d -name "docs" -exec rm -rf {} +
        - rm -rf node_modules/electron
        - rm -rf node_modules/electron-builder
        - rm -rf node_modules/typescript
        - rm -rf node_modules/prisma
  artifacts:
    baseDirectory: .next
    files:
      - 'server/**/*'
      - 'static/**/*'
      - '*-manifest.json'
      - 'required-server-files.json'
      - 'BUILD_ID'
  cache:
    paths:
      - node_modules/**/*

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules
        - rm -rf .next
        - npm install --include=dev
        - npx prisma generate
    build:
      commands:
        - npm run build
        - npm prune --production
        # Prune only redundant heavy binaries, keep all source/types for safety
        - rm -rf node_modules/electron
        - rm -rf node_modules/electron-builder
        - rm -rf node_modules/typescript
        - rm -rf node_modules/prisma
        - find node_modules/.prisma/client -name "libquery_engine-*" ! -name "libquery_engine-rhel-openssl-3.0.x.so.node" -delete
        - find .next -name "*.map" -delete
  artifacts:
    baseDirectory: .next
    files:
      - 'server/**/*'
      - 'static/**/*'
      - '*-manifest.json'
      - 'required-server-files.json'
      - 'BUILD_ID'
